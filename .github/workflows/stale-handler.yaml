name: stale-handler

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

concurrency:
    group: stale-handler
    cancel-in-progress: false

jobs:
    stale:
        runs-on: ubuntu-latest
        permissions:
            issues: write
            pull-requests: write
        steps:
            - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f #v10.2.0
              with:
                  days-before-stale: 30
                  days-before-close: 7
                  stale-issue-label: "stale"

                  stale-issue-message: >
                      This issue has been inactive for 30 days and has been marked as stale.
                      It will be closed in 7 days if there is no further activity.

                  stale-pr-message: >
                      This PR has been inactive for 30 days and has been marked as stale.
                      It will be closed in 7 days if there is no further activity.
                  close-issue-message: >
                      This issue has been closed due to inactivity.
                      Feel free to reopen if it is still relevant.

                  close-pr-message: >
                      This PR has been closed due to inactivity.
                      Feel free to reopen or submit a new one if still relevant.

                  # TODO: include-more
                  exempt-issue-labels: "bug"
                  exempt-pr-labels: "bug"
