name: invoke-docker-workflows

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:
        inputs:
            environment:
                type: choice
                required: true
                options:
                    - development
                    - staging

jobs:
    build:
        uses: ./.github/workflows/docker-build-reusable.yaml
        with:
            environment: ${{ inputs.environment || 'development' }}
        secrets: inherit
