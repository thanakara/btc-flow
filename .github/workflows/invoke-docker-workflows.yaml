name: invoke-docker-workflows

on:
    push:
        branches-ignore:
            - main
    pull_request:
        branches:
            - main
    workflow_dispatch:
        inputs:
            environment:
                type: choice
                required: true
                options:
                    - development
                    - staging

jobs:
    build:
        uses: ./.github/workflows/docker-build-reusable.yaml
        with:
            environment: ${{ inputs.environment || 'development' }}

    push:
        # skip on-push
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: ./.github/workflows/docker-push-reusable.yaml
        with:
            environment: ${{ inputs.environment || 'development'}}
            # NOTE: reusable-workflow can't pass secrets
        secrets: inherit
