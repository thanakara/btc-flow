apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.svc.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "postgre.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.svc.type }}
  ports:
    - port: {{ .Values.svc.port }}
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    {{- include "postgre.selectorLabels" . | nindent 4 }}
