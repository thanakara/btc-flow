x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE}
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-apiserver:8080/execution/"
    AIRFLOW__CORE__INTERNAL_API_URL: "http://airflow-apiserver:8080"
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__API__SECRET_KEY: ${SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${JWT_SECRET}
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: ${JWT_SECRET}
  volumes:
    - ../dags:/opt/airflow/dags
    - ../logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 3s
      retries: 3

  # separate from x-airflow-common (doesn't get circular depends_on itself)
  airflow-init:
    image: ${AIRFLOW_IMAGE}
    command: ["airflow", "db", "migrate"]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  airflow-apiserver:
    <<: *airflow-common
    command: ["airflow", "api-server"]
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: ["airflow", "scheduler"]
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    command: ["airflow", "dag-processor"]
    restart: always
