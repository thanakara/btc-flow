apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.sts.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "postgre.selectorLabels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.svc.name }}
  replicas: {{ .Values.sts.replicas }}
  selector:
    matchLabels:
      {{- include "postgre.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgre.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.sts.image }}
          imagePullPolicy: {{ .Values.sts.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: POSTGRES_DB
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.sts.storage }}
