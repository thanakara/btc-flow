apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.svc.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "grafana.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "grafana.selectorLabels" . | nindent 4 }}
  type: {{ .Values.svc.type }}
  ports:
    - name: http
      port: {{ .Values.svc.port }}
      targetPort: {{ .Values.svc.port }}
